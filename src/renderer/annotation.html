<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screenie Annotation</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #0f1320;
        color: #e9edf5;
        font: 13px/1.35 system-ui, -apple-system, sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 10px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        padding: 8px;
        background: #171d2e;
        border-radius: 10px;
      }

      .toolbar h1 {
        margin: 0 8px 0 0;
        font-size: 14px;
        letter-spacing: 0.03em;
      }

      .toolbar .group {
        display: flex;
        gap: 6px;
      }

      button,
      select,
      input {
        border: 1px solid #334;
        background: #232a40;
        color: inherit;
        border-radius: 7px;
        padding: 6px 10px;
      }

      button.active {
        background: #345baf;
        border-color: #5e82ff;
      }

      button:hover {
        filter: brightness(1.05);
      }

      .workspace {
        flex: 1;
        border-radius: 10px;
        border: 1px solid #2d364d;
        background: #121827;
        overflow: auto;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 8px;
      }

      canvas {
        background: #1a2032;
        max-width: 100%;
        max-height: 100%;
      }

      .status {
        min-height: 18px;
        color: #9aa3bd;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <section class="toolbar">
      <h1>Annotation tools</h1>
      <div class="group">
        <button data-tool="pen" class="active" type="button">Pen</button>
        <button data-tool="rectangle" type="button">Rectangle</button>
        <button data-tool="arrow" type="button">Arrow</button>
        <button data-tool="highlight" type="button">Highlight</button>
      </div>
      <label>
        Color
        <input id="color" type="color" value="#ffeb3b" />
      </label>
      <label>
        Size
        <input id="size" type="range" min="1" max="20" value="4" />
      </label>
      <div class="group">
        <button id="undo" type="button">Undo</button>
        <button id="clear" type="button">Clear</button>
      </div>
      <div class="group">
        <button id="save" type="button">Save</button>
        <button id="cancel" type="button">Cancel</button>
      </div>
    </section>
    <section class="workspace">
      <canvas id="canvas"></canvas>
    </section>
    <section class="status" id="status">Loading image…</section>
    <script type="module" src="/annotation.ts"></script>
  </body>
</html>
